services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  inventory-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
